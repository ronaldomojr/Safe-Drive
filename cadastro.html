<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="cadastro.css">
    <link rel="shortcut icon" href="favicon/favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="container">

        <main class="conteudo">
            <section>
                <h1 class="Comeceagora">Comece Agora!</h1>
                <p class="credenciais">Insira suas informações para seu cadastro</p>
            </section>

            <form id="formCadastro" novalidate>

                <div class="campo">
                    <label>Nome</label>
                    <input type="text" id="nome" placeholder="Digite seu nome" required>
                </div>

                <div class="campo">
                    <label>Endereço de email</label>
                    <input 
                        type="email" 
                        id="email"
                        placeholder="Digite seu e-mail"
                        required>
                    <p class="mensagem-erro" id="erroEmail">Email inválido</p>
                </div>

                <div class="campo">
                    <div class="senha-topo">
                        <label>Senha</label>
                        <button type="button" id="gerarSenha" class="btn-gerar">🎲 Gerar senha forte</button>
                    </div>
                    <div class="senha-wrapper">
                        <input
                            type="password"
                            id="senha"
                            placeholder="Digite sua senha"
                            required>
                        <button type="button" class="toggle-senha" id="toggleSenha" aria-label="Mostrar senha">
                            <svg class="icon-olho" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="icon-olho-fechado" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-7-11-7a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                    <p class="mensagem-erro" id="erroSenha">Senha deve ter 8+ caracteres, letra maiúscula, número e caractere especial</p>
                </div>

                <button type="submit" class="botlogin">Inscreva-se</button>

            </form>

            <div class="divisor">Ou</div>

            <section class="login-social">
                <a href="google.html" class="social-btn">
                    <img src="Imagens/google-logo.png" width="20" alt="Google">
                    Entrar com Google
                </a>
                <a href="apple.html" class="social-btn">
                    <img src="Imagens/apple.png" width="20" alt="Apple">
                    Entrar com Apple
                </a>
            </section>

        </main>

        <div class="imagem">
            <img src="Imagens/image-removebg-preview (1).png" alt="Logo Safe Drive">
        </div>

    </div>

    <script>
        const form = document.getElementById("formCadastro");
        const emailInput = document.getElementById("email");
        const senhaInput = document.getElementById("senha");

        const erroEmail = document.getElementById("erroEmail");
        const erroSenha = document.getElementById("erroSenha");

        emailInput.addEventListener('input', function() {
            this.classList.remove('erro');
            erroEmail.classList.remove('show');
        });

        senhaInput.addEventListener('input', function() {
            this.classList.remove('erro');
            erroSenha.classList.remove('show');
        });

        // Olhinho: mostrar / ocultar a senha
        const toggleSenha = document.getElementById('toggleSenha');

        toggleSenha.addEventListener('click', function () {
            const mostrar = senhaInput.type === 'password';
            senhaInput.type = mostrar ? 'text' : 'password';
            this.classList.toggle('mostrando', mostrar);
            this.setAttribute('aria-label', mostrar ? 'Ocultar senha' : 'Mostrar senha');
        });

        // Gerador de senha aleatória que cumpre TODOS os requisitos
        // (8+ caracteres, maiúscula, minúscula, número e caractere especial)
        const gerarBtn = document.getElementById('gerarSenha');

        gerarBtn.addEventListener('click', function () {
            const maiusculas = 'ABCDEFGHJKLMNPQRSTUVWXYZ'; // sem I e O (confusos)
            const minusculas = 'abcdefghijkmnpqrstuvwxyz'; // sem l
            const numeros    = '23456789';                 // sem 0 e 1
            const especiais  = '!@#$%&*?';
            const todos = maiusculas + minusculas + numeros + especiais;

            const sortear = (conjunto) => conjunto[Math.floor(Math.random() * conjunto.length)];

            // Garante pelo menos um de cada tipo exigido
            const caracteres = [
                sortear(maiusculas),
                sortear(minusculas),
                sortear(numeros),
                sortear(especiais)
            ];

            // Completa até 12 caracteres
            for (let i = caracteres.length; i < 12; i++) {
                caracteres.push(sortear(todos));
            }

            // Embaralha para a ordem não ser previsível
            for (let i = caracteres.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [caracteres[i], caracteres[j]] = [caracteres[j], caracteres[i]];
            }

            senhaInput.value = caracteres.join('');
            senhaInput.type = 'text'; // mostra a senha para o usuário ver/anotar
            toggleSenha.classList.add('mostrando'); // sincroniza o olhinho
            toggleSenha.setAttribute('aria-label', 'Ocultar senha');
            senhaInput.classList.remove('erro');
            erroSenha.classList.remove('show');
            senhaInput.focus();
        });

        form.addEventListener("submit", function (event) {
            event.preventDefault();

            const email = emailInput.value.trim();
            const senha = senhaInput.value;

            const emailValido = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const senhaForte = /^(?=.*[A-Z])(?=.*[!@#$%^&*(),.?":{}|<>]).{8,}$/;

            let valido = true;

            if (!emailValido.test(email)) {
                emailInput.classList.add('erro');
                erroEmail.classList.add('show');
                valido = false;
            }

            if (!senhaForte.test(senha)) {
                senhaInput.classList.add('erro');
                erroSenha.classList.add('show');
                valido = false;
            }

            if (!valido) return;

            // Cadastro válido → redireciona para login
            window.location.href = "index.html";
        });
    </script>

</body>
</html>
