<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="cadastro.css">
    <link rel="shortcut icon" href="favicon/favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="container">

        <main class="conteudo">
            <section>
                <h1 class="Comeceagora">Comece Agora!</h1>
                <p class="credenciais">Insira suas informações para seu cadastro</p>
            </section>

            <form id="formCadastro" novalidate>

                <div class="campo">
                    <label>Nome</label>
                    <input type="text" id="nome" placeholder="Digite seu nome" required>
                </div>

                <div class="campo">
                    <label>Endereço de email</label>
                    <input 
                        type="email" 
                        id="email"
                        placeholder="Digite seu e-mail"
                        required>
                    <p class="mensagem-erro" id="erroEmail">Email inválido</p>
                </div>

                <div class="campo">
                    <div class="senha-topo">
                        <label>Senha</label>
                    </div>
                    <input 
                        type="password" 
                        id="senha"
                        placeholder="Digite sua senha"
                        required>
                    <p class="mensagem-erro" id="erroSenha">Senha deve ter 8+ caracteres, letra maiúscula, número e caractere especial</p>
                </div>

                <button type="submit" class="botlogin">Inscreva-se</button>

            </form>

            <div class="divisor">Ou</div>

            <section class="login-social">
                <a href="google.html" class="social-btn">
                    <img src="Imagens/google-logo.png" width="20" alt="Google">
                    Entrar com Google
                </a>
                <a href="apple.html" class="social-btn">
                    <img src="Imagens/apple.png" width="20" alt="Apple">
                    Entrar com Apple
                </a>
            </section>

        </main>

        <div class="imagem">
            <img src="Imagens/image-removebg-preview (1).png" alt="Logo Safe Drive">
        </div>

    </div>

    <script>
        const form = document.getElementById("formCadastro");
        const emailInput = document.getElementById("email");
        const senhaInput = document.getElementById("senha");

        const erroEmail = document.getElementById("erroEmail");
        const erroSenha = document.getElementById("erroSenha");

        emailInput.addEventListener('input', function() {
            this.classList.remove('erro');
            erroEmail.classList.remove('show');
        });

        senhaInput.addEventListener('input', function() {
            this.classList.remove('erro');
            erroSenha.classList.remove('show');
        });

        form.addEventListener("submit", function (event) {
            event.preventDefault();

            const email = emailInput.value.trim();
            const senha = senhaInput.value;

            const emailValido = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const senhaForte = /^(?=.*[A-Z])(?=.*[!@#$%^&*(),.?":{}|<>]).{8,}$/;

            let valido = true;

            if (!emailValido.test(email)) {
                emailInput.classList.add('erro');
                erroEmail.classList.add('show');
                valido = false;
            }

            if (!senhaForte.test(senha)) {
                senhaInput.classList.add('erro');
                erroSenha.classList.add('show');
                valido = false;
            }

            if (!valido) return;

            // Cadastro válido → redireciona para login
            window.location.href = "index.html";
        });
    </script>

</body>
</html>
